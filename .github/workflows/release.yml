name: Semantic Release

on:
  push:
    branches:
      - main
      - develop

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  test:
    name: Run Tests
    uses: ./.github/workflows/tests.yml

  lint:
    name: Lint Python
    uses: ./.github/workflows/python-lint.yml
    with:
      python-version: "3.13"

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [test, lint]
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
      new_release_channel: ${{ steps.semantic.outputs.new_release_channel }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install semantic-release dependencies
        run: |
          npm install -g semantic-release \
            @semantic-release/commit-analyzer \
            @semantic-release/release-notes-generator \
            @semantic-release/changelog \
            @semantic-release/exec \
            @semantic-release/git \
            @semantic-release/github \
            conventional-changelog-conventionalcommits

      - name: Make update script executable
        run: chmod +x scripts/update-versions.sh

      - name: Run semantic-release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

  build-docker:
    name: Build and Push Docker Image
    needs: release
    if: needs.release.outputs.new_release_published == 'true'
    uses: ./.github/workflows/release-docker-image.yml
    with:
      version: ${{ needs.release.outputs.new_release_version }}
      is_dev: ${{ needs.release.outputs.new_release_channel == 'dev' }}
    secrets: inherit
