name: Build and publish Docker image

on:
  # Called by release.yml after semantic-release creates a new version
  workflow_call:
    inputs:
      version:
        description: 'Version to tag the image with'
        required: true
        type: string
      is_dev:
        description: 'Is this a dev release'
        required: false
        type: boolean
        default: false

  # Manual trigger for building specific tags
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag (e.g. v0.3.0). If set, a versioned image will be built from this tag.'
        required: false
        type: string
      mark_as_latest:
        description: 'Also tag the built image as "latest" (only for manual runs with tag).'
        required: false
        type: boolean
        default: false

jobs:
  lint:
    name: Lint Python project
    uses: ./.github/workflows/python-lint.yml
    # Only run lint for manual dispatches (release.yml already runs it)
    if: ${{ github.event_name == 'workflow_dispatch' }}
    with:
      python-version: "3.13"
      ref: ${{ github.event.inputs.tag || '' }}

  build-and-push:
    name: Build image and push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    needs: [lint]
    # For workflow_call, lint job is skipped, so we need conditional needs
    if: ${{ always() && (needs.lint.result == 'success' || needs.lint.result == 'skipped') }}

    steps:
      # Checkout for manual runs with explicit tag
      - name: Checkout code for manual tag build
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag }}

      # When called from release.yml, semantic-release has just pushed a
      # chore(release) commit that bumps __version__.py / Chart.yaml /
      # package.json and tagged it. We must check out that tag — otherwise
      # the build runs against the pre-release SHA and the image is
      # tagged with one version while its embedded __version__.py still
      # shows the previous one.
      # github.event_name reflects the caller's event (e.g. 'push') when
      # invoked via workflow_call, so we discriminate by the presence of
      # the version input instead.
      - name: Checkout release tag for workflow_call
        if: ${{ github.event_name != 'workflow_dispatch' && inputs.version != '' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: v${{ inputs.version }}

      # Default checkout (manual dispatch without tag)
      - name: Checkout code (default)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag == '' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine VERSION and repository name
        run: |
          VERSION=""

          # workflow_call from release.yml
          if [[ "${{ github.event_name }}" == "workflow_call" || -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          # Manual workflow_dispatch with tag
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.tag }}" ]]; then
            VERSION="${{ github.event.inputs.tag }}"
            # Strip refs/tags/ and a leading "v"
            VERSION="${VERSION#refs/tags/}"
            VERSION="${VERSION#v}"
          fi

          if [[ -n "$VERSION" ]]; then
            echo "Version is $VERSION"
            echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          fi

          REPO_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "REPO_NAME=$REPO_NAME" >> "$GITHUB_ENV"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine tags
        run: |
          if [[ -n "${VERSION:-}" ]]; then
            TAGS="ghcr.io/${{ env.REPO_NAME }}:${VERSION}"

            # Check if this is a dev release (from release.yml)
            if [[ "${{ inputs.is_dev }}" == "true" ]]; then
              # Dev release: version tag + dev tag
              TAGS="$TAGS,ghcr.io/${{ env.REPO_NAME }}:dev"
            elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
              # Manual dispatch: optionally mark as latest
              if [[ "${{ github.event.inputs.mark_as_latest }}" == 'true' ]]; then
                TAGS="$TAGS,ghcr.io/${{ env.REPO_NAME }}:latest"
              fi
            else
              # Production release from release.yml: version tag + latest tag
              TAGS="$TAGS,ghcr.io/${{ env.REPO_NAME }}:latest"
            fi

            echo "TAGS=$TAGS" >> "$GITHUB_ENV"
          else
            echo "No version specified, skipping build"
            exit 1
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.TAGS }}
